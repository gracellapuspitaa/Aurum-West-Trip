<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Aurum Trip</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>

<a href="index.html" class="back-link">← Back To Home</a>

<div class="container">
    <img src="poster_paket_trip.svg" alt="Poster Aurum West Trip" class="poster-img" width="600" height="400">

    <h1>Connect With Us</h1>
    
    <div class="contact-info">
        <p>Have questions about travel? Please contact us through the form below or visit our social media.</p>
    </div>

    <form action="mailto:gracellapuspitaa@gmail.com" method="POST" enctype="text/plain">
        <label>Name:</label>
        <input type="text" name="Nama" required>
        
        <label>Email:</label>
        <input type="email" name="Email" required>
        
        <label>Message:</label>
        <textarea name="Pesan" rows="5" required></textarea>
        
        <button type="submit">Send By Email</button>
    </form>

    <a href="https://www.instagram.com/aurum.trip/" target="_blank" class="social-link">
        Checkout Our Instagram: @aurum.trip
    </a>
</div>


</body>
</html>
